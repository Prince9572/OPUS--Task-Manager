<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPUS — Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Phosphor Icons -->
  <script src="script.js" defer></script>
</head>
<body>

  <!-- ===== TOAST CONTAINER ===== -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ===== CONFIRM MODAL ===== -->
  <div id="confirm-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title" hidden>
    <div class="modal-box">
      <div class="modal-icon"><i class="ph ph-warning"></i></div>
      <h3 id="confirm-title">Confirm Action</h3>
      <p id="confirm-message">Are you sure you want to proceed?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- ===== TASK FORM MODAL ===== -->
  <div id="task-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-box modal-form-box">
      <div class="modal-header">
        <h3 id="modal-title">New Task</h3>
        <button id="modal-close" class="icon-btn" aria-label="Close"><i class="ph ph-x"></i></button>
      </div>

      <form id="task-form" novalidate>
        <input type="hidden" id="task-id" />

        <div class="form-row">
          <div class="form-group full">
            <label for="task-title">Task Title <span class="required">*</span></label>
            <input type="text" id="task-title" placeholder="What needs to be done?" maxlength="80" autocomplete="off" />
            <span class="field-error" id="title-error"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label for="task-desc">Description</label>
            <textarea id="task-desc" placeholder="Add details…" rows="3" maxlength="300"></textarea>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label for="task-date">Date <span class="required">*</span></label>
            <input type="date" id="task-date" />
            <span class="field-error" id="date-error"></span>
          </div>
          <div class="form-group">
            <label for="task-time">Time</label>
            <input type="time" id="task-time" />
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <div class="select-wrapper">
              <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
              <i class="ph ph-caret-down select-arrow"></i>
            </div>
          </div>
          <div class="form-group">
            <label for="task-category">Category</label>
            <div class="select-wrapper">
              <select id="task-category">
                <option value="work">Work</option>
                <option value="study">Study</option>
                <option value="personal">Personal</option>
                <option value="other">Other</option>
              </select>
              <i class="ph ph-caret-down select-arrow"></i>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="form-cancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="form-submit" class="btn btn-gold">
            <i class="ph ph-plus-circle"></i>
            <span id="submit-label">Add Task</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo"><i class="ph ph-diamond"></i></span>
      <span class="brand-name">OPUS</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="tasks">
        <i class="ph ph-squares-four"></i><span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="history">
        <i class="ph ph-clock-clockwise"></i><span>History</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button id="theme-toggle" class="nav-item" aria-label="Toggle theme">
        <i class="ph ph-moon" id="theme-icon"></i><span id="theme-label">Dark Mode</span>
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="icon-btn sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
        <i class="ph ph-list"></i>
      </button>
      <div class="topbar-title">
        <h1 id="view-title">Dashboard</h1>
        <p id="view-date" class="view-subtitle"></p>
      </div>
      <div class="topbar-actions">
        <button id="export-btn" class="btn btn-ghost btn-sm" title="Export tasks">
          <i class="ph ph-export"></i><span class="btn-label">Export</span>
        </button>
        <label class="btn btn-ghost btn-sm" title="Import tasks" for="import-input">
          <i class="ph ph-import"></i><span class="btn-label">Import</span>
        </label>
        <input type="file" id="import-input" accept=".json" hidden />
        <button id="add-task-btn" class="btn btn-gold">
          <i class="ph ph-plus"></i><span>New Task</span>
        </button>
      </div>
    </header>

    <!-- ===== TASKS VIEW ===== -->
    <section id="view-tasks" class="view active">

      <!-- Stats Row -->
      <div class="stats-grid">
        <div class="stat-card" data-accent="gold">
          <div class="stat-icon"><i class="ph ph-list-checks"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total Tasks</span>
          </div>
        </div>
        <div class="stat-card" data-accent="green">
          <div class="stat-icon"><i class="ph ph-check-circle"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-completed">0</span>
            <span class="stat-label">Completed</span>
          </div>
        </div>
        <div class="stat-card" data-accent="amber">
          <div class="stat-icon"><i class="ph ph-hourglass-medium"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-pending">0</span>
            <span class="stat-label">Pending</span>
          </div>
        </div>
        <div class="stat-card" data-accent="red">
          <div class="stat-icon"><i class="ph ph-fire"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-high">0</span>
            <span class="stat-label">High Priority</span>
          </div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">Overall Progress</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Filter / Search Bar -->
      <div class="filter-bar">
        <div class="search-wrapper">
          <i class="ph ph-magnifying-glass"></i>
          <input type="text" id="search-input" placeholder="Search tasks…" autocomplete="off" />
          <button id="clear-search" class="clear-btn" hidden aria-label="Clear search"><i class="ph ph-x-circle"></i></button>
        </div>

        <div class="filter-group">
          <div class="select-wrapper filter-select">
            <select id="filter-status">
              <option value="all">All Status</option>
              <option value="pending">Pending</option>
              <option value="completed">Completed</option>
            </select>
            <i class="ph ph-caret-down select-arrow"></i>
          </div>

          <div class="select-wrapper filter-select">
            <select id="filter-priority">
              <option value="all">All Priority</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <i class="ph ph-caret-down select-arrow"></i>
          </div>

          <div class="select-wrapper filter-select">
            <select id="filter-category">
              <option value="all">All Categories</option>
              <option value="work">Work</option>
              <option value="study">Study</option>
              <option value="personal">Personal</option>
              <option value="other">Other</option>
            </select>
            <i class="ph ph-caret-down select-arrow"></i>
          </div>

          <div class="select-wrapper filter-select">
            <select id="sort-tasks">
              <option value="date-asc">Date ↑</option>
              <option value="date-desc">Date ↓</option>
              <option value="priority-high">Priority ↑</option>
              <option value="priority-low">Priority ↓</option>
              <option value="alpha">A → Z</option>
            </select>
            <i class="ph ph-caret-down select-arrow"></i>
          </div>

          <button id="clear-all-btn" class="btn btn-ghost btn-sm danger-ghost" title="Clear all tasks">
            <i class="ph ph-trash"></i><span class="btn-label">Clear All</span>
          </button>
        </div>
      </div>

      <!-- Task List -->
      <div id="task-list" class="task-list" role="list"></div>
      <div id="empty-state" class="empty-state" hidden>
        <i class="ph ph-notepad"></i>
        <p>No tasks found</p>
        <span>Add a new task or adjust your filters</span>
      </div>

    </section>

    <!-- ===== HISTORY VIEW ===== -->
    <section id="view-history" class="view" hidden>
      <div class="history-tabs">
        <button class="history-tab active" data-htab="completed">
          <i class="ph ph-check-square"></i> Completed
          <span class="tab-badge" id="badge-completed">0</span>
        </button>
        <button class="history-tab" data-htab="deleted">
          <i class="ph ph-trash"></i> Deleted
          <span class="tab-badge" id="badge-deleted">0</span>
        </button>
      </div>
      <div id="history-list" class="task-list" role="list"></div>
      <div id="history-empty" class="empty-state" hidden>
        <i class="ph ph-archive"></i>
        <p>Nothing here yet</p>
        <span>Completed and deleted tasks will appear here</span>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
